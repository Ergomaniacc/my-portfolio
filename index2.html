<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adebola's Futuristic Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      width: 20px;
      height: 20px;
      border: 2px solid #00f6ff;
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.15s ease-out;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
      color: #ffffff;
      z-index: 2;
    }

    .typing {
      color: #00f6ff;
      white-space: nowrap;
      border-right: 3px solid;
      font-size: 1.8rem;
      margin-top: 10px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { border-color: transparent; }
      50% { border-color: #00f6ff; }
    }

    .projects img {
      width: 100%;
      border-radius: 15px;
      transition: all 0.3s ease;
    }

    .projects img:hover {
      box-shadow: 0 0 20px #00f6ff;
      transform: scale(1.05);
    }

    .skills i {
      font-size: 2rem;
      margin: 10px;
      transition: transform 0.3s;
    }

    .skills i:hover {
      transform: scale(1.3);
      color: #00f6ff;
    }

    footer {
      background-color: #111;
      color: #ccc;
      text-align: center;
      padding: 20px;
    }

    /* Modal */
    .modal-content {
      background-color: #1b1b1b;
      color: white;
    }

    .modal-header {
      border-bottom: 1px solid #444;
    }

    .modal-footer {
      border-top: 1px solid #444;
    }
  </style>
</head>
<body>
  <!-- Custom Cursor -->
  <div class="custom-cursor" id="cursor"></div>

  <!-- Hero Section -->
  <div id="particles-js"></div>
  <section class="hero">
    <div>
      <h1 data-aos="zoom-in">Hey, I'm Adebola</h1>
      <div class="typing" id="typing-text"></div>
    </div>
  </section>

  <!-- Projects Section -->
  <section class="projects container py-5">
    <h2 class="text-center mb-4">Projects</h2>
    <div class="row g-4">
      <div class="col-md-4" data-aos="fade-up">
        <img src="project1.jpg" alt="Project 1" class="img-fluid" data-bs-toggle="modal" data-bs-target="#projectModal1">
      </div>
      <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
        <img src="project2.jpg" alt="Project 2" class="img-fluid" data-bs-toggle="modal" data-bs-target="#projectModal2">
      </div>
    </div>
  </section>

  <!-- Skills Section -->
  <section class="skills text-center py-5 bg-dark">
    <h2 class="mb-4">My Skills</h2>
    <div>
      <i class="fab fa-html5"></i>
      <i class="fab fa-css3-alt"></i>
      <i class="fab fa-js"></i>
      <i class="fab fa-react"></i>
      <i class="fab fa-bootstrap"></i>
      <i class="fab fa-php"></i>
      <i class="fas fa-database"></i>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Adebola. All rights reserved.</p>
  </footer>

  <!-- Modal 1 -->
  <div class="modal fade" id="projectModal1" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Project 1</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>Description of Project 1 goes here...</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal 2 -->
  <div class="modal fade" id="projectModal2" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Project 2</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>Description of Project 2 goes here...</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@next/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script>
    AOS.init();

    // Typing Effect
    new Typed('#typing-text', {
      strings: ["Frontend Developer", "Blockchain Enthusiast", "Creative Coder"],
      typeSpeed: 50,
      backSpeed: 25,
      loop: true
    });

    // Custom Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    // Particles
    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        color: { value: "#00f6ff" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        line_linked: { enable: true, distance: 150, color: "#00f6ff", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 2 }
      },
      interactivity: {
        events: { onhover: { enable: true, mode: "repulse" } },
        modes: { repulse: { distance: 100 } }
      }
    });
  </script>
</body>
</html>
